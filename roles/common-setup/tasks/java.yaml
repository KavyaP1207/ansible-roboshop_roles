- name: install maven and mysql
  ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
  loop:
    - maven
    - mysql

- name: install dependencies
  ansible.builtin.command: mvn clean package
  args:
    chdir: /app 

- name: move jar files
  ansible.builtin.command: mv target/{{ component }}-{{ version }}.jar shipping.jar
  args:
    chdir: /app