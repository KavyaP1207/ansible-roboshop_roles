- name: app setup
  ansible.builtin.import_role:
    name: common-setup
    tasks_from: app-setup.yaml

- name: app setup
  ansible.builtin.import_role:
    name: common-setup
    tasks_from: java.yaml

- name: install dependencie
  ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
  loop:
    - cryptography
    - PyMySQL


- name: import shipping data
  community.mysql.mysql_db:
      state: import
      name: all
      login_host: "{{ MYSQL_HOST }}"
      login_user: "{{ MYSQL_ROOT_USER }}"
      login_password: "{{ MYSQL_ROOT_PASSWORD }}"
      target: "{{ item }}"
  loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql 
    - /app/db/master-data.sql

- name: system setup
  ansible.builtin.import_role:
    name: common-setup
    tasks_from: system-setup.yaml
